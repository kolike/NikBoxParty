<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>PartyBox — Игрок</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 30px;
            background: #f8f9fa;
        }

        h1 {
            color: #333;
        }

        #game-area {
            display: none;
            margin-top: 30px;
        }

        input,
        button {
            font-size: 1.2em;
            padding: 12px;
            margin: 10px;
            border-radius: 8px;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
        }

        #status {
            margin-top: 20px;
            font-size: 1.3em;
        }
    </style>
</head>

<body>
    <h1>📱 Кто я?</h1>

    <div id="lobby">
        <input id="room-code" placeholder="Код комнаты" maxlength="4" style="text-transform: uppercase;">
        <input id="name" placeholder="Твоё имя">
        <button onclick="joinRoom()">Зайти</button>
    </div>

    <div id="game-area">
        <h2>Кто я?</h2>
        <p id="description" style="font-size:1.4em; min-height:80px;"></p>

        <input id="answer" placeholder="Напиши свой ответ" style="width:80%;">
        <button onclick="submitAnswer()">Отправить ответ</button>
    </div>

    <div id="status"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentCode = null;

        function joinRoom() {
            const code = document.getElementById("room-code").value.trim().toUpperCase();
            const name = document.getElementById("name").value.trim() || "Игрок";
            if (code.length !== 4) return alert("Код — 4 символа");

            currentCode = code;
            socket.emit("join-room", { code, name });
            document.getElementById("lobby").style.display = "none";
        }

        function submitAnswer() {
            const answer = document.getElementById("answer").value.trim();
            if (!answer || !currentCode) return;

            socket.emit("submit-answer", { code: currentCode, answer });
            document.getElementById("status").innerHTML = "✅ Ответ отправлен!";
        }

        socket.on("game-started", (data) => {
            document.getElementById("game-area").style.display = "block";
            document.getElementById("description").innerText = data.character
                ? `Подсказка: ${data.character}`
                : "Угадай персонажа!";
        });

        socket.on("answer-received", () => {
            document.getElementById("status").innerHTML = "✅ Ответ принят!";
        });
    </script>
</body>

</html>
