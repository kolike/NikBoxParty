<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PartyBox — Игрок</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="player-bg">
    <main class="container small">
        <h1>📱 Кто я?</h1>

        <section id="lobby">
            <input id="room-code" placeholder="Код комнаты" maxlength="4" style="text-transform: uppercase;">
            <input id="name" placeholder="Твоё имя">
            <button class="btn btn-primary" onclick="joinRoom()">Зайти</button>
            <button class="btn" onclick="refreshState()">Проверить комнату</button>
        </section>

        <section id="game-area" style="display:none;">
            <h2>Лобби</h2>
            <p id="description" class="hint">Вы в комнате</p>
            <button class="btn" onclick="leaveRoom()">Покинуть комнату</button>
        </section>

        <div id="status" class="status"></div>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentCode = null;

        function joinRoom() {
            const code = document.getElementById("room-code").value.trim().toUpperCase();
            const name = document.getElementById("name").value.trim() || "Игрок";
            if (code.length !== 4) {
                alert("Код комнаты — 4 символа");
                return;
            }

            currentCode = code;
            socket.emit("join-room", { code, name });
        }

        function refreshState() {
            const code = document.getElementById("room-code").value.trim().toUpperCase();
            if (code.length !== 4) return;
            socket.emit("get-room-state", { code });
        }

        function leaveRoom() {
            if (!currentCode) return;
            socket.emit("leave-room", { code: currentCode });
            currentCode = null;
            document.getElementById("lobby").style.display = "block";
            document.getElementById("game-area").style.display = "none";
            document.getElementById("status").innerText = "Вы вышли из комнаты";
        }

        function renderState(state) {
            const count = state.players.length;
            const host = state.players.find((p) => p.id === state.hostId);
            document.getElementById("description").innerText = `Игроков: ${count}. Ведущий: ${host ? host.name : "—"}`;
        }

        socket.on("joined-room", (state) => {
            document.getElementById("lobby").style.display = "none";
            document.getElementById("game-area").style.display = "block";
            document.getElementById("status").innerText = "✅ Подключено. Ждите старта.";
            renderState(state);
        });

        socket.on("room-state-updated", renderState);
        socket.on("room-state", (state) => {
            document.getElementById("status").innerText = `Комната ${state.code} найдена`;
            renderState(state);
        });

        socket.on("app-error", (message) => {
            document.getElementById("status").innerText = `⚠️ ${message}`;
        });
    </script>
</body>
</html>
