<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PartyBox — Host</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="host-bg">
    <main class="container">
        <h1>🎮 PartyBox</h1>
        <p class="subtitle">Экран ведущего</p>

        <button class="btn btn-primary" onclick="createRoom()">Создать комнату</button>
        <button class="btn btn-warning" onclick="refreshState()">Обновить состояние</button>
        <button class="btn" onclick="leaveRoom()">Покинуть комнату</button>

        <div id="room-code" class="room-code"></div>

        <section id="players">
            <h2>Игроки (0)</h2>
            <div class="player-list" id="player-list"></div>
        </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentRoomCode = null;

        function createRoom() {
            socket.emit("create-room");
        }

        function refreshState() {
            if (!currentRoomCode) return;
            socket.emit("get-room-state", { code: currentRoomCode });
        }

        function leaveRoom() {
            if (!currentRoomCode) return;
            socket.emit("leave-room", { code: currentRoomCode });
            currentRoomCode = null;
            document.getElementById("room-code").innerHTML = "";
            document.querySelector("#players h2").innerText = "Игроки (0)";
            document.getElementById("player-list").innerHTML = "";
        }

        function renderState(state) {
            currentRoomCode = state.code;
            document.getElementById("room-code").innerHTML = `Код комнаты: <strong>${state.code}</strong>`;
            document.querySelector("#players h2").innerText = `Игроки (${state.players.length})`;
            const list = document.getElementById("player-list");
            list.innerHTML = "";
            state.players.forEach((player) => {
                const div = document.createElement("div");
                div.className = "player-card";
                div.innerText = player.id === state.hostId ? `👑 ${player.name}` : player.name;
                list.appendChild(div);
            });
        }

        socket.on("room-created", renderState);
        socket.on("room-state-updated", renderState);
        socket.on("room-state", renderState);

        socket.on("app-error", (message) => alert(message));
    </script>
</body>
</html>
